<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anime Movie Catalog</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <header>
    <h1>Anime Movie Database</h1>
    <p>Explore the catalog, filter by your favorites, and test your knowledge.</p>
    <button id="open-trivia-btn" class="header-btn">Play Anime Trivia!</button>
  </header>

  <main>
    <section class="search-section">
      <input type="text" id="search-bar" placeholder="Search for an anime by title (e.g., Spirited Away)...">
      <button id="search-btn">Search</button>
    </section>

    <section class="controls-section">
      <div class="control-group">
        <label for="studio-filter">Studio:</label>
        <select id="studio-filter">
          <option value="all">All Studios</option>
        </select>
      </div>

      <div class="control-group">
        <label for="genre-filter">Genre:</label>
        <select id="genre-filter">
          <option value="all">All Genres</option>
        </select>
      </div>

      <div class="control-group">
        <label for="year-filter">Release Year:</label>
        <select id="year-filter">
          <option value="all">All Years</option>
        </select>
      </div>

      <div class="control-group surprise-me-group">
        <button id="surprise-btn">Surprise Me!</button>
      </div>
    </section>

    <section class="catalog-section">
      <div class="catalog-header">
        <h2>Movie Catalog</h2>

        <div class="sort-controls">
          <label for="sort-select">Sort By:</label>
          <select id="sort-select">
            <option value="default">Default</option>
            <option value="score-desc">Score (High to Low)</option>
            <option value="year-desc">Release Year (Newest)</option>
            <option value="year-asc">Release Year (Oldest)</option>
            <option value="title-asc">Title (A-Z)</option>
          </select>
        </div>
      </div>

      <div id="card-container" class="grid-container">
      </div>

      <article class="movie-card" id="template-card" style="display: none;">
        <div class="card-image">
          <img src="" alt="Poster" class="card-img-target">
        </div>
        <div class="card-content">
          <h3 class="card-title-target">Title Placeholder</h3>
          <div class="badges card-genres-target"></div>
          <p class="synopsis card-synopsis-target">Synopsis placeholder...</p>
          <div class="card-footer">
            <span class="score card-score-target">⭐ 0.0</span>
            <span class="year card-year-target">0000</span>
          </div>
        </div>
      </article>

    </section>
  </main>

  <div id="trivia-modal" class="modal-overlay" style="display: none;">
    <div class="modal-content">
      <button id="close-modal-btn" class="close-btn">&times;</button>
      <h2>Daily Anime Trivia</h2>
      <div id="trivia-container">
        <p id="trivia-question">Click 'Start' to test your knowledge!</p>
        <div class="trivia-options">
          <button class="trivia-btn" id="btn-a" disabled>Option A</button>
          <button class="trivia-btn" id="btn-b" disabled>Option B</button>
          <button class="trivia-btn" id="btn-c" disabled>Option C</button>
          <button class="trivia-btn" id="btn-d" disabled>Option D</button>
        </div>
        <button id="start-trivia-btn">Start Trivia</button>
        <p id="trivia-feedback"></p>
      </div>
    </div>
  </div>

  <script src="scripts.js"></script>
</body>

</html>
