<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anime Movie Catalog</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <header>
    <h1>Anime Movie Database</h1>
    <p>Explore the catalog, filter by your favorites, and test your knowledge.</p>
    <button id="open-trivia-btn" class="header-btn">Play Anime Trivia!</button>
  </header>

  <main>
    <section class="search-section">
    
      <div class="search-input-wrapper">
    
        <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
    
        <input type="text" id="search-bar" placeholder="Search for an anime by title (e.g., Spirited Away)..." autofocus>
      </div>
    </section>

    <section class="controls-section">
      <div class="control-group">
        <label for="studio-filter">Studio:</label>
        <select id="studio-filter">
          <option value="all">All Studios</option>
        </select>
      </div>

      <div class="control-group custom-dropdown-group">
        <label>Genres:</label>
        <div class="custom-dropdown" id="genre-dropdown-container">
      
          <button id="genre-toggle" class="dropdown-toggle">Select Genres <span>▼</span></button>
      
          <div id="genre-menu" class="dropdown-menu">
            <div id="genre-checkbox-container" class="checkbox-grid-2col">Check boxes
            </div>
          </div>
      
        </div>
      </div>

      <div class="control-group">
        <label for="year-filter">Release Year:</label>
        <select id="year-filter">
          <option value="all">All Years</option>
        </select>
      </div>

      <div class="control-group surprise-me-group">
        <button id="reset-btn" class="secondary-btn" title="Cancel filter">
          <svg fill="#f20202" width="18" height="18" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
            <g stroke-width="0" />
            <g stroke-linecap="round" stroke-linejoin="round" />
            <path
              d="M30 11.414 28.586 10 24 14.586 19.414 10 18 11.414 22.586 16 18 20.585 19.415 22 24 17.414 28.587 22 30 20.587 25.414 16z" />
            <path
              d="M4 4a2 2 0 0 0-2 2v3.17a2 2 0 0 0 .586 1.415L10 18v8a2 2 0 0 0 2 2h4a2 2 0 0 0 2-2v-2h-2v2h-4v-8.83l-.586-.585L4 9.171V6h20v2h2V6a2 2 0 0 0-2-2Z" />
            <path data-name="&lt;Transparent Rectangle&gt;" style="fill:none" d="M0 0h32v32H0z" />
          </svg>
        </button>
        <button id="surprise-btn">Surprise Me!</button> 
      </div>
    </section>

    <section class="catalog-section">
      <div class="catalog-header">
        <h2>Movie Catalog</h2>

        <div class="sort-controls">
          <label for="sort-select">Sort By:</label>
          <select id="sort-select">
            <option value="default">Default</option>
            <option value="score-desc">Score (High to Low)</option>
            <option value="year-desc">Release Year (Newest)</option>
            <option value="year-asc">Release Year (Oldest)</option>
            <option value="title">Title (A-Z)</option>
          </select>
        </div>
      </div>

      <div id="card-container" class="grid-container">
      </div>

      <article class="movie-card" id="template-card" style="display: none;">
        <div class="card-image">
          <img src="" alt="Poster" class="card-img-target">
        </div>
        <div class="card-content">
          <h3 class="card-title-target">Title Placeholder</h3>
      
          <p class="studio-label card-studio-target">Studio Placeholder</p>
      
          <div class="badges card-genres-target"></div>
      
          <div class="synopsis-container">
            <p class="synopsis card-synopsis-target">Synopsis placeholder...</p>
            <button class="read-more-btn">Read More</button>
          </div>
      
          <div class="card-footer">
            <span class="score card-score-target">⭐ 0.0</span>
            <span class="year card-year-target">0000</span>
          </div>
        </div>
      </article>

    </section>
  </main>

  <div id="trivia-modal" class="modal-overlay" style="display: none;">
    <div class="modal-content">
      <button id="close-modal-btn" class="close-btn">&times;</button>
      <h2>Daily Anime Trivia</h2>
      <div id="trivia-container">
        <p id="trivia-question">Click 'Start' to test your knowledge!</p>
        <div class="trivia-options">
          <button class="trivia-btn" id="btn-a" disabled>Option A</button>
          <button class="trivia-btn" id="btn-b" disabled>Option B</button>
          <button class="trivia-btn" id="btn-c" disabled>Option C</button>
          <button class="trivia-btn" id="btn-d" disabled>Option D</button>
        </div>
        <button id="start-trivia-btn">Start Trivia</button>
        <p id="trivia-feedback"></p>
      </div>
    </div>
  </div>
  <script src="./assets/anime_data.js"></script>
  <script src="scripts.js"></script>
</body>

</html>
